# Render Blueprint Specification
# https://render.com/docs/blueprints

databases:
  - name: tvratepostgres
    region: oregon
    # PostgreSQL 16

services:
  - name: tv-rate-display
    type: web
    env: node
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        fromDatabase:
          name: tvratepostgres
          property: connectionString
    autoDeploy: true
    healthCheckPath: /api/health